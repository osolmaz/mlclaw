name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run format
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run coverage
      - run: npm run dry
      - run: npm run mutate
      - run: npm run slophammer
      - run: npm run check:secrets
      - run: npm run pack:check
