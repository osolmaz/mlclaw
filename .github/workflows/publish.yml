name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish the npm package"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      publish_image:
        description: "Also build and push the runtime image"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      update_template_space:
        description: "Also update the canonical Hugging Face template Space"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      template_space:
        description: "Canonical Hugging Face template Space"
        required: true
        default: "osolmaz/mlclaw"
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - id: package-version
        shell: bash
        run: |
          version="$(node -p 'require("./package.json").version')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - run: npm run check:secrets
      - run: npm run pack:check
      - name: Check Hugging Face token for template update
        if: ${{ github.event_name == 'release' || inputs.update_template_space == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is required when updating the canonical Hugging Face template Space."
            exit 1
          fi
      - run: npm publish --access public --provenance
        if: ${{ github.event_name == 'release' || inputs.publish_npm == 'true' }}
      - name: Log in to GHCR
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish runtime image
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mlclaw-runtime:latest
            ghcr.io/${{ github.repository_owner }}/mlclaw-runtime:${{ steps.package-version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/mlclaw-runtime:v${{ steps.package-version.outputs.version }}
      - name: Update canonical Hugging Face template Space
        if: ${{ github.event_name == 'release' || inputs.update_template_space == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MLCLAW_CANONICAL_SPACE_ID: ${{ inputs.template_space || 'osolmaz/mlclaw' }}
        run: node dist/mlclaw.mjs update "$MLCLAW_CANONICAL_SPACE_ID" --force
