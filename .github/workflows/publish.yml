name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish the npm package"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      publish_image:
        description: "Also build and push the runtime image"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      update_template_space:
        description: "Also update the canonical Hugging Face template Space"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      template_space:
        description: "Canonical Hugging Face template Space"
        required: true
        default: "osolmaz/mlclaw"
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: false
      - id: runtime-config
        shell: bash
        run: |
          version="$(node -p 'require("./package.json").version')"
          openclaw_version="$(node -p 'require("./package.json").config.openclawVersion')"
          brokerkit_plugin_version="$(node -p 'require("./package.json").config.brokerkitPluginVersion')"
          brokerkit_version="$(node -p 'require("./package.json").config.brokerkitVersion')"
          runtime_image="$(node -p 'require("./package.json").config.runtimeImageRepository')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "openclaw_version=${openclaw_version}" >> "$GITHUB_OUTPUT"
          echo "brokerkit_plugin_version=${brokerkit_plugin_version}" >> "$GITHUB_OUTPUT"
          echo "brokerkit_version=${brokerkit_version}" >> "$GITHUB_OUTPUT"
          echo "runtime_image=${runtime_image}" >> "$GITHUB_OUTPUT"
          echo "runtime_tag=${version}-openclaw-${openclaw_version}" >> "$GITHUB_OUTPUT"
      - run: npm ci
      - run: npm run release:check
      - name: Build pinned HF Broker
        run: |
          git init "$RUNNER_TEMP/brokerkit"
          git -C "$RUNNER_TEMP/brokerkit" fetch --depth=1 https://github.com/osolmaz/brokerkit.git \
            "refs/tags/${{ steps.runtime-config.outputs.brokerkit_version }}:refs/tags/${{ steps.runtime-config.outputs.brokerkit_version }}"
          git -C "$RUNNER_TEMP/brokerkit" checkout --detach "${{ steps.runtime-config.outputs.brokerkit_version }}"
          test "$(git -C "$RUNNER_TEMP/brokerkit" rev-parse \
            "refs/tags/${{ steps.runtime-config.outputs.brokerkit_version }}^{commit}")" = \
            "$(git -C "$RUNNER_TEMP/brokerkit" rev-parse HEAD)"
          go build -C "$RUNNER_TEMP/brokerkit" -o "$RUNNER_TEMP/hf-broker" ./brokers/huggingface/cmd/hf-broker
      - name: Test pinned BrokerKit agent tools
        env:
          MLCLAW_HF_BROKER_BINARY: ${{ runner.temp }}/hf-broker
        run: npm test -- --run test/mlclaw.brokerkit-agent-tools.test.ts
      - run: npm run build
      - run: npm run format
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run coverage
      - run: npm run dry
      - name: Mutation tests (opt-in)
        if: ${{ vars.MLCLAW_RUN_MUTATION == '1' }}
        run: npm run mutate
      - run: npm run slophammer
      - run: npm run check:secrets
      - run: npm run pack:check
      - name: Check Hugging Face token for template update
        if: ${{ github.event_name == 'release' || inputs.update_template_space == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is required when updating the canonical Hugging Face template Space."
            exit 1
          fi
      - run: npm publish --access public --provenance
        if: ${{ github.event_name == 'release' || inputs.publish_npm == 'true' }}
      - name: Log in to GHCR
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up QEMU
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' }}
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' }}
        uses: docker/setup-buildx-action@v3
      - name: Build and publish runtime image
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            OPENCLAW_VERSION=${{ steps.runtime-config.outputs.openclaw_version }}
            OPENCLAW_BASE_IMAGE=ghcr.io/openclaw/openclaw:${{ steps.runtime-config.outputs.openclaw_version }}
            BROKERKIT_PLUGIN_VERSION=${{ steps.runtime-config.outputs.brokerkit_plugin_version }}
            BROKERKIT_VERSION=${{ steps.runtime-config.outputs.brokerkit_version }}
            MLCLAW_RUNTIME_IMAGE=${{ steps.runtime-config.outputs.runtime_image }}:${{ steps.runtime-config.outputs.runtime_tag }}
          tags: |
            ${{ steps.runtime-config.outputs.runtime_image }}:${{ steps.runtime-config.outputs.runtime_tag }}
            ${{ steps.runtime-config.outputs.runtime_image }}:openclaw-${{ steps.runtime-config.outputs.openclaw_version }}
            ${{ steps.runtime-config.outputs.runtime_image }}:sha-${{ github.sha }}
            ${{ steps.runtime-config.outputs.runtime_image }}:latest
      - name: Warn if GHCR image is not public
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          gh api --method PATCH /orgs/huggingface/packages/container/mlclaw/visibility -f visibility=public
      - name: Verify anonymous GHCR image pull
        if: ${{ github.event_name == 'release' || inputs.publish_image == 'true' || inputs.update_template_space == 'true' }}
        env:
          MLCLAW_PUBLISHED_IMAGE: ${{ steps.runtime-config.outputs.runtime_image }}:${{ steps.runtime-config.outputs.runtime_tag }}
        run: |
          tmp_docker_config="$(mktemp -d)"
          trap 'rm -rf "$tmp_docker_config"' EXIT
          DOCKER_CONFIG="$tmp_docker_config" docker buildx imagetools inspect "$MLCLAW_PUBLISHED_IMAGE"
      - name: Update canonical Hugging Face template Space
        if: ${{ github.event_name == 'release' || inputs.update_template_space == 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MLCLAW_CANONICAL_SPACE_ID: ${{ inputs.template_space || 'osolmaz/mlclaw' }}
        run: node dist/mlclaw.mjs update "$MLCLAW_CANONICAL_SPACE_ID" --force
